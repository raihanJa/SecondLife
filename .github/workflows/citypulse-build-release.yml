name: Build CityPulseSimulator Windows executable

on:
  push:
    tags:
      - "citypulse-v*.*.*"
  workflow_dispatch:

defaults:
  run:
    working-directory: CityPulseSimulator

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller CityPulseSimulator.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CityPulseSimulator-windows
          path: CityPulseSimulator/dist/CityPulseSimulator.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CityPulseSimulator/dist/CityPulseSimulator.exe
